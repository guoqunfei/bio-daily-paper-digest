name: Daily Literature Digest

on:
  schedule:
    - cron: '7 1 * * *'
  workflow_dispatch:
    inputs:
      keywords_override:
        description: '临时覆盖关键词（JSON格式，用于测试）'
        required: false
        type: string

env:
  PYTHONUNBUFFERED: "1"

permissions:
  contents: write
  actions: read
  artifacts: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || github.token }}
          persist-credentials: true

      - name: Restore dedup & feedback cache
        uses: actions/cache@v4
        with:
          path: .paper-digest-cache
          key: paper-digest-cache-${{ github.run_id }}
          restore-keys: |
            paper-digest-cache-

      - name: Restore archive cache
        uses: actions/cache@v4
        with:
          path: output
          key: paper-digest-archive-${{ github.run_id }}
          restore-keys: |
            paper-digest-archive-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily literature digest
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          KEYWORDS_OVERRIDE: ${{ github.event.inputs.keywords_override }}
          MAX_EMAIL_PAPERS: "15"
          MIN_RELEVANCE_SCORE: "5"
        run: |
          python scripts/main.py

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: output/
          retention-days: 30

      - name: Commit output to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ .paper-digest-cache/
          git diff --staged --quiet || git commit -m "📚 Daily digest: $(date +%Y-%m-%d)"
          git push
