# ==========================================
# 文献过滤配置：基因组学与结构变异领域
# ==========================================

# 核心关键词白名单：标题或摘要中必须匹配至少 1 个
# 匹配计分：普通匹配 +1 分，标题匹配额外 +2 分
core_keywords:
  # === 技术方法 ===
  - "structural variation"
  - "genome assembly"
  - "chromosome-level"
  - "scaffold"
  - "Hi-C"
  - "Micro-C"
  - "Pore-C"
  - "long-read sequencing"
  - "PacBio"
  - "Oxford Nanopore"
  - "Nanopore"
  - "third-generation sequencing"
  - "de novo assembly"
  - "haplotype-resolved"
  - "TAD"
  - "topologically associating domain"
  - "promoter-enhancer"
  - "3D genome"
  - "chromosome conformation"
  - "scaffolding"
  - "genome polishing"
  - "haplotig"
  - "benchmark"
  - "comparative genomics"
  # === 工具链 ===
  - "yahs"
  - "hifiasm"
  - "canu"
  - "flye"
  - "nextpolish"
  - "purge_haplotigs"
  - "merqury"
  - "BUSCO"
  - "QUAST"
  - "sniffles"
  - "sniffles2"
  - "cuteSV"
  - "SVIM"
  - "pbsv"
  - "bcftools"
  - "truvari"
  - "minimap2"
  - "bwa"
  - "winnowmap"
  - "juicer"
  - "3D-DNA"
  - "SALSA"
  - "getorganelle"
  - "mitos"
  - "alphaFold"
  - "alphaFold3"
  # === 物种/领域 ===
  - "Myrmecia"
  - "bull ant"
  - "Formicidae"
  - "ant genome"
  - "arthropod genomics"
  - "insect genome"
  - "pig genome"
  - "Sus scrofa"
  - "porcine"
  - "swine"
  - "livestock genome"
  - "mitochondrial genome"
  - "mitogenome"
  - "antifreeze protein"
  - "AFP"
  - "ice-binding protein"
  - "thermal hysteresis"
  - "cryoprotective"
  - "freeze tolerance"
  - "ice nucleation"

# 高价值关键词：标题中出现直接 +3 分（你的核心研究方向）
high_value_keywords:
  - "myrmecia"
  - "bull ant"
  - "pig genome"
  - "sus scrofa"
  - "antifreeze protein"
  - "structural variation"
  - "genome assembly"
  - "hi-c"
  - "long-read"
  - "chromosome-level assembly"

# 排除关键词黑名单：标题或摘要中出现则直接丢弃
exclude_keywords:
  - "clinical trial"
  - "patient"
  - "patients"
  - "cancer"
  - "carcinoma"
  - "tumor"
  - "oncology"
  - "therapy"
  - "therapeutic"
  - "drug"
  - "vaccine"
  - "COVID-19"
  - "SARS-CoV-2"
  - "diabetes"
  - "Alzheimer"
  - "disease"
  - "pathogen"
  - "pathogenic"
  - "infection"
  - "gut microbiome"
  - "gut microbiota"
  - "metagenomics"
  - "metagenome"
  - "breast cancer"
  - "lung cancer"
  - "colorectal cancer"
  - "prostate cancer"
  - "case report"
  - "case study"
  - "cohort"
  - "prognosis"
  - "biomarker"

# 推送控制
max_email_papers: 15
min_relevance_score: 5
lookback_days: 2

# 多源配置
sources:
  pubmed:
    enabled: true
    max_results: 100
    lookback_days: 2
  arxiv:
    enabled: true
    categories:
      - "q-bio.GN"
      - "q-bio.PE"
      - "cs.LG"
    max_results: 30
    lookback_days: 2
  semantic_scholar:
    enabled: true
    max_results: 30
    lookback_days: 3
